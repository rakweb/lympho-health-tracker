<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Health Tracker (PWA Minimal)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0b1220" />

  <!-- ✅ Proper favicon data URI (note: wrapped in a <link> tag) -->
  <link rel="icon" href="data:image/svg+xml;utf8,
    <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'>
      <rect width='64' height='64' rx='12' fill='%230b1220'/>
      <path d='M10 42h12l6-18 9 27 6-15h8l4 8h10' fill='none' stroke='%234ba3ff'
            stroke-width='4' stroke-linecap='round' stroke-linejoin='round'/>
    </svg>" />

  <!-- ✅ Proper manifest link (NO literal “> ./manifest.webmanifest” text) -->
  <link rel="manifest" href="./manifest.webmanifest" />

  <style>
    :root { --bg:#0b1220; --text:#e6eefc; --ring:#2b3a58; --muted:#9fb2d6; --btn:#1a2842; --btn-hover:#223152; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:var(--text); background:linear-gradient(180deg,#0a1120 0,#0b1220 60%,#0d1322 100%); }
    header { position:sticky; top:0; z-index:10; backdrop-filter:blur(8px); background:rgba(9,13,24,.6); border-bottom:1px solid var(--ring); }
    .wrap { max-width:900px; margin:0 auto; padding:16px; }
    h1 { margin:0 0 6px; font-size:22px; }
    .sub { color:var(--muted); font-size:13px; }
    .row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    .spacer { flex:1; }
    .btn { background:var(--btn); color:var(--text); border:1px solid #2a3b67; padding:9px 12px; border-radius:10px; cursor:pointer; }
    .btn:hover{ background:var(--btn-hover); }
    .card { margin:16px auto; max-width:900px; background:linear-gradient(180deg,rgba(26,38,64,.4) 0,rgba(9,15,29,.6) 100%);
      border:1px solid var(--ring); border-radius:12px; padding:16px; }
    .small { font-size:12px; color:var(--muted); }
    code { background:#0e1a30; border:1px solid var(--ring); padding:2px 6px; border-radius:6px; }
  </style>
</head>
<body>
  <header>
    <div class="wrap row">
      <div>
        <h1>Health Tracker (PWA Minimal)</h1>
        <div class="sub">App <strong id="appVersion">—</strong> • Build <strong id="buildNumber">—</strong> • SW <strong id="swVersion">—</strong></div>
      </div>
      <div class="spacer"></div>
      <button id="btnInstall" class="btn" style="display:none">Install</button>
      <button id="btnCheckUpdates" class="btn">Check for updates</button>
      <span id="hint" class="small"></span>
    </div>
  </header>

  <main class="wrap">
    <div class="card">
      <h2>Minimal PWA</h2>
      <p>Installable + offline. Auto-versioning via <code>version.json</code> and SW cache name.</p>
      <p class="small">Get this stable first. We can add Chart.js and jsPDF afterward with correct tags.</p>
    </div>
  </main>

  <!-- ✅ Your script ONLY (no library URLs dumped as plain text) -->
  <script>
    const BUILD = { appVersion: 'dev', buildNumber: 'dev', commit: '-', timestamp: '-' };
    const $ = (id) => document.getElementById(id);

    fetch('./version.json', { cache: 'no-store' })
      .then(r => r.ok ? r.json() : null)
      .then(v => { if (v) Object.assign(BUILD, { appVersion: v.version, buildNumber: v.build, commit: v.commit?.slice(0,7), timestamp: v.timestamp }); })
      .catch(()=>{})
      .finally(()=>{ $('appVersion').textContent = BUILD.appVersion || 'dev'; $('buildNumber').textContent = BUILD.buildNumber || 'dev'; });

    // Install (A2HS)
    let deferredPrompt = null;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault(); deferredPrompt = e;
      $('btnInstall').style.display = 'inline-block'; $('hint').textContent = 'Click Install to add to your device.';
    });
    $('btnInstall').addEventListener('click', async () => {
      try { if (!deferredPrompt) return; deferredPrompt.prompt(); const { outcome } = await deferredPrompt.userChoice;
        $('hint').textContent = outcome==='accepted'?'Installing…':'Install dismissed.';
      } finally { deferredPrompt=null; $('btnInstall').style.display='none'; setTimeout(()=> $('hint').textContent='',1500); }
    });
    window.addEventListener('appinstalled', () => { $('btnInstall').style.display='none'; $('hint').textContent='Installed!'; setTimeout(()=> $('hint').textContent='',1500); });

    // SW register + updates
    let swReg = null;
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', async () => {
        try {
          const reg = await navigator.serviceWorker.register('./sw.js'); swReg = reg;
          const ask = () => navigator.serviceWorker.controller?.postMessage({ type:'GET_VERSION' });
          navigator.serviceWorker.addEventListener('message', (evt)=>{ if (evt?.data?.type==='VERSION' && evt.data.cache) $('swVersion').textContent = evt.data.cache; });
          if (reg.active) ask(); else navigator.serviceWorker.ready.then(ask);
          reg.addEventListener('updatefound', ()=>{ const sw = reg.installing; sw?.addEventListener('statechange', ()=>{ if (sw.state==='installed' && navigator.serviceWorker.controller) $('hint').textContent='New version available. Click “Check for updates”.'; }); });
        } catch (e) { console.error('SW registration failed', e); }
        navigator.serviceWorker.addEventListener('controllerchange', () => window.location.reload());
      });
    }
    $('btnCheckUpdates').addEventListener('click', async () => {
      try { $('hint').textContent='Checking…'; if (swReg?.update) await swReg.update();
        if (swReg?.waiting) swReg.waiting.postMessage({ type:'SKIP_WAITING' });
        else { $('hint').textContent='No updates found.'; setTimeout(()=> $('hint').textContent='',1500); }
      } catch (e) { console.warn('Update check failed', e); $('hint').textContent = 'Update check failed.'; setTimeout(()=> $('hint').textContent='',1500); }
    });
  </script>
</body>
</html>
